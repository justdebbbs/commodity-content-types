<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Signal Radar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #080a0f;
  --surface: #0d1117;
  --border: #1a2332;
  --border-bright: #1e3a5f;
  --text: #e2eaf7;
  --muted: #4a6080;
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.1);
  --magenta: #ff2d78;
  --yellow: #ffe600;
  --mid: #ff9500;
  --item-h: 56px;
  --visible: 5; /* odd number — selected is center */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 48px;
  position: relative;
  overflow-x: hidden;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Grid bg */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
header {
  text-align: center;
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
}

.eyebrow {
  font-size: 0.58rem;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.7;
}

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 3.5vw, 2.6rem);
  font-weight: 900;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text);
  text-shadow: 0 0 20px rgba(0,229,255,0.3), 0 0 60px rgba(0,229,255,0.08);
  line-height: 1.1;
}

h1 span {
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan), 0 0 30px rgba(0,229,255,0.5);
}

header p {
  margin-top: 8px;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── Radar ── */
.radar-col {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
  padding: 0;
  min-height: 360px;
}

.radar-verdict {
  padding: 20px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.radar-verdict-label {
  display: none;
}

.verdict-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.62rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.4s, text-shadow 0.4s;
  line-height: 1.2;
  white-space: nowrap;
}

.spectrum-bar {
  width: 100%;
  height: 3px;
  background: linear-gradient(to right, var(--magenta), var(--mid), var(--cyan));
  border-radius: 2px;
  position: relative;
}

.spectrum-marker {
  width: 8px; height: 8px;
  background: var(--text);
  border-radius: 50%;
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 6px rgba(255,255,255,0.7);
}

canvas#radar {
  width: 100%;
  height: auto;
  display: block;
}

/* ── 3-col main grid ── */
.main {
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  gap: 16px;
  width: 100%;
  max-width: 1060px;
  position: relative;
  z-index: 1;
  align-items: stretch;
}

/* ── Panel corners ── */
.panel {
  border: 1px solid var(--border-bright);
  background: var(--surface);
  position: relative;
}

.panel::before, .panel::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-color: var(--cyan);
  border-style: solid;
  opacity: 0.5;
}
.panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.carousel-col {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border-bright);
  background: var(--surface);
  position: relative;
  overflow: hidden;
}

.carousel-col::before, .carousel-col::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-color: var(--cyan);
  border-style: solid;
  opacity: 0.5;
  z-index: 10;
}
.carousel-col::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.carousel-col::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.carousel-header {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.carousel-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.carousel-arrows {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.carousel-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.6rem;
  padding: 0;
  line-height: 1;
  transition: color 0.15s, text-shadow 0.15s;
  font-family: 'Share Tech Mono', monospace;
}
.carousel-btn:hover { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }

.carousel-btn-random {
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 8px;
  border: 1px solid var(--border-bright);
  color: var(--cyan);
  transition: all 0.15s;
}
.carousel-btn-random:hover {
  background: var(--cyan-dim);
  border-color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
  box-shadow: 0 0 10px rgba(0,229,255,0.1);
}

/* Viewport — shows exactly --visible items */
.carousel-viewport {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Top and bottom fade masks */
.carousel-viewport::before,
.carousel-viewport::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 80px;
  pointer-events: none;
  z-index: 5;
}
.carousel-viewport::before {
  top: 0;
  background: linear-gradient(to bottom, var(--surface), transparent);
}
.carousel-viewport::after {
  bottom: 0;
  background: linear-gradient(to top, var(--surface), transparent);
}

/* Selected item highlight band */
.carousel-highlight {
  position: absolute;
  left: 0; right: 0;
  height: var(--item-h);
  top: 0;
  border-top: 1px solid rgba(0,229,255,0.25);
  border-bottom: 1px solid rgba(0,229,255,0.25);
  background: rgba(0,229,255,0.04);
  pointer-events: none;
  z-index: 4;
}

/* Left accent bar on selected */
.carousel-highlight::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
}

/* The scrolling track */
.carousel-track {
  position: absolute;
  left: 0; right: 0;
  top: 0;
  transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  will-change: transform;
}

.carousel-item {
  height: var(--item-h);
  display: flex;
  align-items: center;
  padding: 0 14px 0 16px;
  cursor: pointer;
  transition: opacity 0.3s;
  position: relative;
  user-select: none;
}

.carousel-item-inner {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.carousel-item-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color 0.3s, text-shadow 0.3s;
  white-space: nowrap;
}

.carousel-item-sub {
  font-size: 0.52rem;
  letter-spacing: 0.04em;
  color: var(--muted);
  transition: color 0.3s;
}

.carousel-item.is-selected .carousel-item-name {
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,229,255,0.6);
}
.carousel-item.is-selected .carousel-item-sub { color: rgba(0,229,255,0.5); }

/* Distance-based dimming applied via JS */

/* ── Levers ── */
.levers { display: flex; flex-direction: column; }

.levers-header {
  padding: 10px 18px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  flex-shrink: 0;
}

.lever-item {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
}
.lever-item:last-child { border-bottom: none; }
.lever-item:hover { background: rgba(0,229,255,0.02); }

.lever-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 9px;
}

.lever-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.54rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
  font-weight: 600;
}

.lever-value-label {
  font-size: 0.54rem;
  letter-spacing: 0.03em;
  transition: color 0.3s;
}

.lever-track {
  display: flex;
  gap: 4px;
  margin-bottom: 5px;
}

.lever-segment {
  flex: 1;
  height: 4px;
  background: var(--border);
  cursor: pointer;
  border-radius: 1px;
  transition: background 0.2s, box-shadow 0.2s;
  position: relative;
}
.lever-segment::after {
  content: '';
  position: absolute;
  top: -8px; left: 0; right: 0; bottom: -8px;
}
.lever-segment.filled {
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan), 0 0 12px rgba(0,229,255,0.25);
}
.lever-segment.filled.warn {
  background: var(--magenta);
  box-shadow: 0 0 6px var(--magenta), 0 0 10px rgba(255,45,120,0.25);
}

.lever-ends {
  display: flex;
  justify-content: space-between;
}
.lever-end {
  font-size: 0.5rem;
  color: var(--muted);
}

@media (max-width: 760px) {
  body { padding: 20px 14px 40px; }

  .main {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  /* Mobile order: carousel → radar → levers */
  .carousel-col { order: 1; }
  .radar-col    { order: 2; }
  .levers       { order: 3; }

  /* Tighter carousel on mobile — 3 visible items */
  .carousel-col {
    --item-h: 56px;
    height: calc(56px * 3 + 43px); /* 3 items + header */
  }
  #carouselViewport {
    height: calc(56px * 3) !important;
  }

  /* Shrink fade masks so they don't cover the center item */
  .carousel-viewport::before,
  .carousel-viewport::after {
    height: 40px;
  }

  .radar-col {
    min-height: auto;
  }

  canvas#radar {
    max-height: 240px;
    width: auto;
    margin: 0 auto;
    display: block;
  }
}
</style>
</head>
<body>

<header>
  <div class="eyebrow">// Content Format Diagnostic</div>
  <h1>Commodity vs. <span>Non-Commodity</span> Content Types</h1>
  <p>See where your content type falls &bull; Adjust the levers &bull; Close the commodity gap</p>
</header>

<!-- 3-col grid -->
<div class="main">

  <!-- Col 1: DDR Carousel -->
  <div class="carousel-col">
    <div class="carousel-header">
      <span>Content Format</span>
      <div class="carousel-nav">
        <button class="carousel-btn carousel-btn-random" id="btnRandom">Random</button>
        <div class="carousel-arrows">
          <button class="carousel-btn" id="btnUp">▲</button>
          <button class="carousel-btn" id="btnDown">▼</button>
        </div>
      </div>
    </div>
    <div class="carousel-viewport" id="carouselViewport">
      <div class="carousel-highlight"></div>
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
  </div>

  <!-- Col 2: Levers -->
  <div class="panel levers" id="levers">
    <div class="levers-header">Adjust the Levers</div>
  </div>

  <!-- Col 3: Radar -->
  <div class="panel radar-col">
    <div class="radar-verdict">
      <div class="radar-verdict-label">// Verdict</div>
      <div class="verdict-text" id="verdictText">SCANNING...</div>
      <div class="spectrum-bar">
        <div class="spectrum-marker" id="spectrumMarker"></div>
      </div>
    </div>
    <canvas id="radar" width="600" height="600"></canvas>
  </div>

</div>

<script>
// ── Data ──────────────────────────────────────────────────
const CONTENT_TYPES = [
  { id: 'listicle',          name: 'Listicle',         sub: 'Top 10 / Best of',       defaults: [2,1,1,1] },
  { id: 'glossary',          name: 'Glossary',         sub: 'Definition / Terms',     defaults: [1,1,1,1] },
  { id: 'comparison',        name: 'Comparison',       sub: 'vs. / Alternative',      defaults: [3,1,1,1] },
  { id: 'howto',             name: 'How-To',           sub: 'Guide / Tutorial',       defaults: [2,2,1,2] },
  { id: 'thoughtleadership', name: 'Opinion',          sub: 'Thought Leadership',     defaults: [3,3,3,2] },
  { id: 'casestudy',         name: 'Case Study',       sub: 'Named / Data-backed',    defaults: [3,3,3,3] },
  { id: 'dataresearch',      name: 'Original Data',    sub: 'Study / Survey',         defaults: [2,3,3,2] },
  { id: 'interactivetool',   name: 'Interactive',      sub: 'Tool / Calculator',      defaults: [2,2,2,2] },
  { id: 'productreview',     name: 'Product Review',   sub: 'Long-form / Hands-on',   defaults: [3,3,3,3] },
  { id: 'template',          name: 'Template',         sub: 'Downloadable Asset',     defaults: [2,2,1,2] },
];

const LEVERS = [
  { id: 'focus',        name: 'Focus',        ends: ['Broad topic','Specific situation'],    labels: ['Broad topic','Mixed focus','Specific situation'],           value: 1 },
  { id: 'authenticity', name: 'Authenticity', ends: ['Desk research','First-hand'],          labels: ['Desk research','Mixed sources','First-hand'],               value: 1 },
  { id: 'originality',  name: 'Originality',  ends: ['Generic take','Unique POV'],           labels: ['Generic take','Some differentiation','Unique POV'],         value: 1 },
  { id: 'audience',     name: 'Audience',     ends: ['For anyone','For someone specific'],   labels: ['For anyone','Niche topic','For someone specific'],          value: 1 },
];

let selectedIndex = 0;
let hasInteracted = false;
let animFrame = null;

const ITEM_H = 56;
const VISIBLE = 5;

const CLONE_COUNT = 3; // clones on each side
let isSpinning = false;

// ── Carousel ──────────────────────────────────────────────
function buildCarousel() {
  const track = document.getElementById('carouselTrack');
  track.innerHTML = '';
  const total = CONTENT_TYPES.length;
  const isMobile = window.innerWidth <= 760;
  const visibleCount = isMobile ? 3 : VISIBLE;

  for (let i = total - CLONE_COUNT; i < total; i++) {
    track.appendChild(makeCarouselItem(CONTENT_TYPES[i], i, true));
  }
  CONTENT_TYPES.forEach((ct, i) => {
    track.appendChild(makeCarouselItem(ct, i, false));
  });
  for (let i = 0; i < CLONE_COUNT; i++) {
    track.appendChild(makeCarouselItem(CONTENT_TYPES[i], i, true));
  }

  const vp = document.getElementById('carouselViewport');
  vp.style.height = (ITEM_H * visibleCount) + 'px';
}

function makeCarouselItem(ct, realIndex, isClone) {
  const el = document.createElement('div');
  el.className = 'carousel-item';
  el.dataset.realIndex = realIndex;
  el.dataset.isClone = isClone ? '1' : '0';
  el.innerHTML = `
    <div class="carousel-item-inner">
      <div class="carousel-item-name">${ct.name}</div>
      <div class="carousel-item-sub">${ct.sub}</div>
    </div>`;
  if (!isClone) {
    el.addEventListener('click', () => { if (!isSpinning) selectType(realIndex); });
  }
  return el;
}

// trackIndex = position in the full track array (clones + real + clones)
// real items start at CLONE_COUNT
function realToTrack(realIndex) { return realIndex + CLONE_COUNT; }

function getVpH() {
  const isMobile = window.innerWidth <= 760;
  const visibleCount = isMobile ? 3 : VISIBLE;
  return ITEM_H * visibleCount;
}

function positionCarousel(animate = true, trackIndex = null) {
  const track = document.getElementById('carouselTrack');
  const vpH = getVpH();
  const ti = trackIndex !== null ? trackIndex : realToTrack(selectedIndex);
  const centerOffset = (vpH / 2) - (ITEM_H / 2);
  const translateY = centerOffset - (ti * ITEM_H);

  track.style.transition = animate ? 'transform 0.32s cubic-bezier(0.25, 0.8, 0.25, 1)' : 'none';
  track.style.transform = `translateY(${translateY}px)`;

  // Position highlight band at exact center of viewport
  const highlight = document.querySelector('.carousel-highlight');
  if (highlight) {
    highlight.style.top = centerOffset + 'px';
    highlight.style.transform = 'none';
  }

  // Style all items by distance from selected
  document.querySelectorAll('.carousel-item').forEach((el, i) => {
    const dist = Math.abs(i - ti);
    el.classList.toggle('is-selected', i === ti);
    const opacities = [1, 0.65, 0.35, 0.18];
    el.style.opacity = opacities[Math.min(dist, opacities.length - 1)];
  });
}

function selectType(index, animate = true) {
  selectedIndex = index;
  const ct = CONTENT_TYPES[index];
  LEVERS.forEach((l, i) => l.value = ct.defaults[i]);
  positionCarousel(animate);
  renderLevers();
  updateVerdict();
}

function nudge(dir) {
  // dir: -1 = up, +1 = down
  const next = selectedIndex + dir;
  const total = CONTENT_TYPES.length;
  const track = document.getElementById('carouselTrack');
  const vpH = getVpH();
  const centerOffset = (vpH / 2) - (ITEM_H / 2);

  let ti = realToTrack(selectedIndex) + dir;
  // Apply position with animation
  track.style.transition = 'transform 0.28s cubic-bezier(0.25, 0.8, 0.25, 1)';
  track.style.transform = `translateY(${centerOffset - ti * ITEM_H}px)`;

  document.querySelectorAll('.carousel-item').forEach((el, i) => {
    const dist = Math.abs(i - ti);
    el.classList.toggle('is-selected', i === ti);
    const opacities = [1, 0.65, 0.35, 0.18];
    el.style.opacity = opacities[Math.min(dist, opacities.length - 1)];
  });

  // After animation, snap to real position silently if on clone
  setTimeout(() => {
    const newReal = ((next % total) + total) % total;
    selectedIndex = newReal;
    const ct = CONTENT_TYPES[newReal];
    LEVERS.forEach((l, i) => l.value = ct.defaults[i]);
    positionCarousel(false);
    renderLevers();
    updateVerdict();
  }, 300);
}

// Random spin — slot machine effect
function spinRandom() {
  if (isSpinning) return;
  isSpinning = true;

  const total = CONTENT_TYPES.length;
  const target = Math.floor(Math.random() * total);
  // Spin at least one full loop plus offset to target
  const spins = total + ((target - selectedIndex + total) % total);
  let step = 0;

  // Accelerate then decelerate
  const delays = [];
  for (let i = 0; i < spins; i++) {
    const progress = i / spins;
    // Fast in middle, slow at start/end
    const speed = progress < 0.2 ? 80 - progress * 100
                : progress > 0.75 ? 60 + (progress - 0.75) * 400
                : 40;
    delays.push(Math.round(speed));
  }

  let elapsed = 0;
  function tick() {
    if (step >= spins) {
      isSpinning = false;
      selectType(target, true);
      return;
    }
    const dir = 1;
    const next = ((selectedIndex + dir) % total + total) % total;
    selectedIndex = next;
    positionCarousel(true);
    step++;
    elapsed += delays[step - 1] || 60;
    setTimeout(tick, delays[step] || 60);
  }
  tick();
}

document.getElementById('btnUp').addEventListener('click', () => { if (!isSpinning) nudge(-1); });
document.getElementById('btnDown').addEventListener('click', () => { if (!isSpinning) nudge(1); });
document.getElementById('btnRandom').addEventListener('click', spinRandom);

document.getElementById('carouselViewport').addEventListener('wheel', (e) => {
  e.preventDefault();
  if (!isSpinning) nudge(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp' && !isSpinning) nudge(-1);
  if (e.key === 'ArrowDown' && !isSpinning) nudge(1);
});

// ── Levers ────────────────────────────────────────────────
function renderLevers() {
  const container = document.getElementById('levers');
  // Keep the header, rebuild the rest
  const header = container.querySelector('.levers-header');
  container.innerHTML = '';
  container.appendChild(header);

  LEVERS.forEach((lever, li) => {
    const col = lever.value === 1 ? 'var(--magenta)' : lever.value === 2 ? 'var(--mid)' : 'var(--cyan)';
    const item = document.createElement('div');
    item.className = 'lever-item';
    item.innerHTML = `
      <div class="lever-header">
        <span class="lever-name">${lever.name}</span>
        <span class="lever-value-label" id="lbl-${lever.id}" style="color:${col}">${lever.labels[lever.value-1]}</span>
      </div>
      <div class="lever-track" id="trk-${lever.id}">
        ${[1,2,3].map(v => `<div class="lever-segment${lever.value>=v?' filled':''}${lever.value>=v&&lever.value===1?' warn':''}" data-li="${li}" data-v="${v}"></div>`).join('')}
      </div>
      <div class="lever-ends">
        <span class="lever-end">${lever.ends[0]}</span>
        <span class="lever-end">${lever.ends[1]}</span>
      </div>`;
    container.appendChild(item);
  });

  document.querySelectorAll('.lever-segment').forEach(seg => {
    seg.addEventListener('click', () => {
      const li = +seg.dataset.li, v = +seg.dataset.v;
      LEVERS[li].value = v;
      refreshLever(li);
      updateVerdict();
    });
  });
}

function refreshLever(li) {
  const lever = LEVERS[li];
  const col = lever.value === 1 ? 'var(--magenta)' : lever.value === 2 ? 'var(--mid)' : 'var(--cyan)';
  document.getElementById(`lbl-${lever.id}`).textContent = lever.labels[lever.value-1];
  document.getElementById(`lbl-${lever.id}`).style.color = col;
  document.querySelectorAll(`#trk-${lever.id} .lever-segment`).forEach(seg => {
    const v = +seg.dataset.v;
    seg.className = 'lever-segment'
      + (lever.value >= v ? ' filled' : '')
      + (lever.value >= v && lever.value === 1 ? ' warn' : '');
  });
}

// ── Radar ─────────────────────────────────────────────────
function lerpColor(t) {
  if (t < 0.5) {
    const s = t * 2;
    return { r: 255, g: Math.round(45+(149-45)*s), b: Math.round(120+(0-120)*s) };
  } else {
    const s = (t-0.5)*2;
    return { r: Math.round(255+(0-255)*s), g: Math.round(149+(229-149)*s), b: Math.round(0+(255-0)*s) };
  }
}

function getAvg() {
  return LEVERS.reduce((a,l) => a + l.value, 0) / LEVERS.length;
}

function edgeNoise(edgeIndex, time, seed) {
  const s = edgeIndex * 137.5 + seed * 91.3;
  return (
    Math.sin(time * 0.9 + s) * 0.55 +
    Math.sin(time * 1.7 + s * 1.8) * 0.28 +
    Math.sin(time * 0.5 + s * 3.1) * 0.17
  );
}

let morphTime = 0;

function drawRadar() {
  const canvas = document.getElementById('radar');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const R = W * 0.36;
  const n = LEVERS.length;
  const scores = LEVERS.map(l => l.value);
  const avg = getAvg();
  const t = (avg-1)/2;
  const col = lerpColor(t);
  const strokeColor = `rgb(${col.r},${col.g},${col.b})`;
  const fillColor = `rgba(${col.r},${col.g},${col.b},0.15)`;
  const glowColor = `rgba(${col.r},${col.g},${col.b},0.55)`;

  ctx.clearRect(0,0,W,H);

  // Grid rings
  for (let ring=1; ring<=3; ring++) {
    const r = (ring/3)*R;
    ctx.beginPath();
    for (let i=0; i<n; i++) {
      const a = (i/n)*Math.PI*2 - Math.PI/2;
      const x = cx+r*Math.cos(a), y = cy+r*Math.sin(a);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = ring===3 ? '#243448' : '#1a2836';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axis lines
  for (let i=0; i<n; i++) {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(a), cy+R*Math.sin(a));
    ctx.strokeStyle = '#243448';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Anchor points — pinned to score positions
  const anchors = scores.map((s, i) => {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    const ratio = (s-1)/2;
    const dist = (0.18 + ratio * 0.82) * R;
    return { x: cx + dist*Math.cos(a), y: cy + dist*Math.sin(a) };
  });

  // Morph amplitude scales with avg score
  const morphAmp = R * (0.12 + ((avg-1)/2) * 0.18);

  // Organic morphing polygon
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 18;
  ctx.beginPath();

  for (let i=0; i<n; i++) {
    const curr = anchors[i];
    const next = anchors[(i+1) % n];

    const mx = (curr.x + next.x) / 2;
    const my = (curr.y + next.y) / 2;

    const dx = next.x - curr.x;
    const dy = next.y - curr.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const px = -dy / len;
    const py =  dx / len;

    const toCx = cx - mx, toCy = cy - my;
    const toCLen = Math.sqrt(toCx*toCx + toCy*toCy) || 1;
    // Outward direction = away from center
    const outX = -(toCx / toCLen);
    const outY = -(toCy / toCLen);

    const radial  = Math.abs(edgeNoise(i, morphTime, 0)) * morphAmp * 1.2;
    const lateral = edgeNoise(i, morphTime, 1) * morphAmp * 0.4;

    // Ensure control point is always further from center than midpoint
    const baseCpx = mx + outX * radial + px * lateral;
    const baseCpy = my + outY * radial + py * lateral;

    // Safety: if cp is closer to center than midpoint, push it out
    const midDist = Math.sqrt((mx-cx)**2 + (my-cy)**2);
    const cpDist  = Math.sqrt((baseCpx-cx)**2 + (baseCpy-cy)**2);
    const scale   = cpDist < midDist ? (midDist + 4) / (cpDist || 1) : 1;
    const cpx = cx + (baseCpx - cx) * scale;
    const cpy = cy + (baseCpy - cy) * scale;

    if (i===0) ctx.moveTo(curr.x, curr.y);
    ctx.quadraticCurveTo(cpx, cpy, next.x, next.y);
  }

  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Anchor nodes
  anchors.forEach(({x, y}) => {
    ctx.save();
    ctx.shadowColor = strokeColor;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle = strokeColor;
    ctx.fill();
    ctx.restore();
  });

  // Ring intersection ticks
  for (let i=0; i<n; i++) {
    for (let ring=1; ring<=3; ring++) {
      const a = (i/n)*Math.PI*2 - Math.PI/2;
      const r = (ring/3)*R;
      ctx.beginPath();
      ctx.arc(cx+r*Math.cos(a), cy+r*Math.sin(a), 2, 0, Math.PI*2);
      ctx.fillStyle = '#2a4560';
      ctx.fill();
    }
  }
}

// ── Continuous morph animation ────────────────────────────
let morphStartTime = null;
function morphLoop(ts) {
  if (!morphStartTime) morphStartTime = ts;
  morphTime = (ts - morphStartTime) / 1000;
  drawRadar();
  animFrame = requestAnimationFrame(morphLoop);
}

function idleLoop(ts) { morphLoop(ts); }

// ── Verdict ───────────────────────────────────────────────
function updateVerdict() {
  const avg = getAvg();
  const pct = ((avg - 1) / 2) * 100;
  document.getElementById('spectrumMarker').style.left = `${Math.min(97, Math.max(3, pct))}%`;

  const vt = document.getElementById('verdictText');
  if (avg <= 1.25) {
    vt.style.color = 'var(--magenta)';
    vt.style.textShadow = '0 0 10px var(--magenta)';
    vt.textContent = 'HIGH COMMODITY RISK';
  } else if (avg < 1.75) {
    vt.style.color = 'var(--mid)';
    vt.style.textShadow = '0 0 8px var(--mid)';
    vt.textContent = 'BORDERLINE COMMODITY';
  } else if (avg < 2.5) {
    vt.style.color = 'var(--yellow)';
    vt.style.textShadow = '0 0 8px var(--yellow)';
    vt.textContent = 'APPROACHING NON-COMMODITY';
  } else {
    vt.style.color = 'var(--cyan)';
    vt.style.textShadow = '0 0 10px var(--cyan)';
    vt.textContent = 'NON-COMMODITY CONTENT';
  }
}

// ── Init ──────────────────────────────────────────────────
buildCarousel();
selectType(0, false);
requestAnimationFrame(morphLoop);
</script>
</body>
</html>
